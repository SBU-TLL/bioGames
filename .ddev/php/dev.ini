; DDEV-only PHP settings for bioGames. Loaded ONLY in the container — never deployed.
; short_open_tag: some apps (dnafp/*.php) use legacy `<?`.
; auto_prepend_file: hardened Shibboleth mock (fail-closed / APP_ENV-gated).
; error_reporting: drop notices/deprecations/warnings for these 2016-era apps on PHP 8.
short_open_tag = On
auto_prepend_file = /var/www/html/.ddev/php/shib_dev_prepend.php
display_errors = On
display_startup_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_NOTICE & ~E_STRICT & ~E_WARNING
